<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Playlists | PlayWave</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/playlists.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
     <script type="module" src="js/playlists.js" defer></script>
     <script src="js/main.js"></script>
</head>
<body>
    <div class="background-gradient"></div>
    
    <header class="main-header">
        <div class="logo">
            <span class="logo-icon">PW</span>
            <h1>Play<span>Wave</span></h1>
        </div>
        
        <nav class="main-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="playlists.html" class="active"><i class="fas fa-music"></i> Playlists</a></li>
                <li><a href="sugestoes.html"><i class="fas fa-lightbulb"></i> Sugestões</a></li>
                <li id="config"><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="FAQ.html">💬 FAQS</a></li>
            </ul>
        </nav>
        
        <div class="user-menu">
            <img src="" alt="Foto do usuário" class="user-avatar">
            <span class="username">Usuario</span>
        </div>
    </header>
    
    <main class="playlists-main">
        <div class="playlists-header">
            <div class="header-content">
                <h2><i class="fas fa-headphones"></i> Minhas Playlists</h2>
                <p>Gerencie e organize suas coleções musicais</p>
            </div>
            <button class="new-playlist-btn">
                <i class="fas fa-plus"></i> Nova Playlist
            </button>
        </div>
        
        <div class="playlists-filter">
            <div class="filter-tabs">
                <button class="filter-tab active">Todas</button>
                <button class="filter-tab">Favoritas</button>
                
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search" placeholder="Buscar playlists...">
            </div>
        </div>
        
        <div class="playlists-grid">
           
        </div> 
        
    </main>
    
    <footer class="main-footer">
        <!-- Rodapé igual ao da index.html -->
    </footer>
    
   
</body>
</html>
