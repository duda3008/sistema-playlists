<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões | PlayWave</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/sugestoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
     <script type="module" src="js/sugestoes.js" defer></script> 
<script src="js/main.js"></script>
</head>
<body>
    <div class="background-gradient"></div>
    
    <header class="main-header">
        <div class="logo">
            <span class="logo-icon">PW</span>
            <h1>Play<span>Wave</span></h1>
        </div>
        
        <nav class="main-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                <li><a href="playlists.html"><i class="fas fa-music"></i> Playlists</a></li>
                <li><a href="sugestoes.html" class="active"><i class="fas fa-lightbulb"></i> Sugestões</a></li>
                <li id="config"><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="FAQ.html">💬 FAQS</a></li>
            </ul>
        </nav>
        
        <div class="user-menu">
            <img src="" alt="Foto do usuário" class="user-avatar">
            <span class="username">usuario</span>
        </div>
    </header>
    
    <main class="sugestoes-main">
        <section class="sugestoes-hero">
            <div class="hero-content">
                <h1>Descubra novas músicas</h1>
                <p>Playlists personalizadas baseadas no seu gosto musical</p>
                
            </div>
            <div class="hero-image">
                <img src="img/garota2.png" alt="Descubra novas músicas">
            </div>
        </section>
        
    
        <section class="mood-section">
            <div class="section-header">
                <h2><i class="fas fa-cloud"></i> Selecione seu humor</h2>
            </div>
            
            <div class="mood-grid">
                <!-- Humor 1 -->
                <div class="mood-card" style="background: linear-gradient(135deg, #FF2E63, #FF6B6B)">
                    <div class="mood-icon">
                        <i class="fas fa-heart"></i>
                    </div>
                    <h3>Romântico</h3>
                </div>
                
                <!-- Humor 2 -->
                <div class="mood-card" style="background: linear-gradient(135deg, #08D9D6, #00C9FF)">
                    <div class="mood-icon">
                        <i class="fas fa-smile"></i>
                    </div>
                    <h3>Feliz</h3>
                </div>
                
                <!-- Humor 3 -->
                <div class="mood-card" style="background: linear-gradient(135deg, #FF9A3C, #FFCC70)">
                    <div class="mood-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <h3>Energizado</h3>
                </div>
                
                <!-- Humor 4 -->
                <div class="mood-card" style="background: linear-gradient(135deg, #6A4C93, #8A5A44)">
                    <div class="mood-icon">
                        <i class="fas fa-cloud-rain"></i>
                    </div>
                    <h3>Melancólico</h3>
                </div>
            </div>
        </section>
        
        
       
    </main>
    
    <footer class="main-footer">
        <!-- Rodapé igual ao da index.html -->
    </footer>
    
    <!-- <script src="scripts/main.js"></script>
    <script src="scripts/sugestoes.js"></script> -->
</body>
</html>
